<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- Header -->
        <tr>
          <td style="background:#13131c;padding:20px 32px;border-radius:8px 8px 0 0;">
            <span style="font-size:1.1rem;font-weight:700;color:#e8e8f0;letter-spacing:-0.01em;">
              {{ app_name }}
            </span>
            <span style="float:right;font-size:0.78rem;color:#55556a;line-height:2.2;">{{ date_str }}</span>
          </td>
        </tr>

        <!-- Subject -->
        <tr>
          <td style="background:#ffffff;padding:28px 32px 4px 32px;">
            <h1 style="margin:0 0 0.5em 0;font-size:1.35rem;font-weight:700;color:#111;line-height:1.3;">
              {{ subject }}
            </h1>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="background:#ffffff;padding:8px 32px 28px 32px;font-size:0.95rem;line-height:1.7;color:#2d2d2d;">
            {{ body_html|safe }}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#f4f4f7;padding:20px 32px;border-radius:0 0 8px 8px;text-align:center;">
            <p style="margin:0;font-size:0.72rem;color:#999;line-height:1.6;">
              You're receiving this because you subscribed to the {{ app_name }} daily briefing.<br>
              <a href="{{ unsubscribe_url }}" style="color:#7c9ef8;text-decoration:none;">Unsubscribe</a>
              &nbsp;·&nbsp;
              <a href="{{ base_url }}/newsletter" style="color:#7c9ef8;text-decoration:none;">View in browser</a>
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
