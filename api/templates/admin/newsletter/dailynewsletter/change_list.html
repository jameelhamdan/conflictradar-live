{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content %}
<div class="pipeline-toolbar">
  <form method="post" action="">
    {% csrf_token %}
    <div class="pipeline-toolbar__inner">

      <div class="pipeline-section">
        <span class="pipeline-section__label">Generate</span>
        <label class="pipeline-field">
          Date
          <input type="date" name="newsletter_date" placeholder="today">
        </label>
        <button class="button pipeline-btn" name="pipeline_action" value="generate">Generate</button>
      </div>

      <div class="pipeline-section">
        <span class="pipeline-section__label">Send</span>
        <label class="pipeline-field">
          Date
          <input type="date" name="send_date" placeholder="today">
        </label>
        <button class="button pipeline-btn" name="pipeline_action" value="send">Send</button>
      </div>

      <div class="pipeline-section pipeline-section--run-all">
        <label class="pipeline-field">
          Date
          <input type="date" name="all_date" placeholder="today">
        </label>
        <button class="button pipeline-btn pipeline-btn--run-all" name="pipeline_action" value="generate_and_send">
          ▶ Generate &amp; Send
        </button>
      </div>

    </div>
  </form>
</div>

<style>
.pipeline-toolbar {
  margin: 0 0 16px;
  padding: 12px 14px;
  background: #1e2228;
  border: 1px solid #2c3038;
  border-radius: 4px;
}
.pipeline-toolbar__inner {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 20px;
}
.pipeline-section {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding-right: 20px;
  border-right: 1px solid #2c3038;
}
.pipeline-section:last-child {
  border-right: none;
  padding-right: 0;
}
.pipeline-section__label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: #79aec8;
  margin-right: 4px;
  white-space: nowrap;
}
.pipeline-field {
  display: flex;
  flex-direction: column;
  font-size: 11px;
  color: #999;
  gap: 3px;
}
.pipeline-field input {
  font-size: 13px;
  padding: 4px 6px;
  border: 1px solid #2c3038;
  border-radius: 3px;
  background: #13171c;
  color: #e0e0e0;
}
.pipeline-btn {
  padding: 5px 12px;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
}
.pipeline-btn--run-all {
  background: #417690;
  color: #fff;
  border-color: #2c5770;
  font-weight: 600;
  padding: 6px 16px;
}
.pipeline-btn--run-all:hover {
  background: #2c5770;
}
</style>

{{ block.super }}
{% endblock %}
